{% import "macros/page.html" as page_macros %}
{% extends "base.html" %}

{% block content %}
<main id="main-content" class="listing-page" tabindex="-1">
    <p class="eyebrow">Tag</p>
    <h1>#{{ term.name }}</h1>
    <p><a href="{{ get_url(path="tags/") }}">All tags</a></p>
    <div class="writing-list">
        {% for page in term.pages | sort(attribute="date") | reverse %}{{ page_macros::page_listing(page=page, heading_level=2) }}{% endfor %}
    </div>
</main>
{% endblock content %}
