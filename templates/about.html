{% extends "base.html" %}

{% block structured_data %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ config.extra.profile.name }}",
  "url": "{{ config.base_url }}",
  "jobTitle": "{{ config.extra.profile.role }}",
  "sameAs": [
    "https://github.com/{{ config.extra.social.github }}",
    "https://www.linkedin.com/in/{{ config.extra.social.linkedin }}/"
  ]
}
</script>
{% endblock structured_data %}

{% block content %}
<main id="main-content" tabindex="-1">
    <article class="about-page">
        <header>
            <p class="eyebrow">Professional background and working style</p>
            <h1>{{ page.title }}</h1>
        </header>
        <div class="content">{{ page.content | safe }}</div>
    </article>
</main>
{% endblock content %}
