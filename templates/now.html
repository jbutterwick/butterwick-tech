{% extends "base.html" %}

{% block content %}
<main id="main-content" tabindex="-1">
    <article class="now-page">
        <header>
            <p class="eyebrow">A current snapshot</p>
            <h1>{{ page.title }}</h1>
            {% if page.updated %}<p class="page-updated">Updated {{ page.updated | date(format="%B %d, %Y") }}</p>{% endif %}
        </header>
        <div class="content">{{ page.content | safe }}</div>
    </article>
</main>
{% endblock content %}
