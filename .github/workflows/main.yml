name: Verify site and export résumé

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/main.yml
      - content/**
      - config.toml
      - data/**
      - package.json
      - package-lock.json
      - public/**
      - sass/**
      - scripts/**
      - static/**
      - tailwind.config.js
      - templates/**
      - themes/prairie/sass/**
  pull_request:
    paths:
      - .github/workflows/main.yml
      - content/**
      - config.toml
      - data/**
      - package.json
      - package-lock.json
      - public/**
      - sass/**
      - scripts/**
      - static/**
      - tailwind.config.js
      - templates/**
      - themes/prairie/sass/**

permissions:
  contents: read

concurrency:
  group: site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-export:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install Zola
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: zola@0.22.1
          fallback: none

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2

      - name: Install dependencies
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install --yes poppler-utils

      - name: Run unit tests
        run: python3 -m unittest scripts/test_verify_resume.py scripts/test_export_resume_pdf.py scripts/test_normalize_html.py scripts/test_verify_site.py -v

      - name: Build, export, and verify résumé
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: python3 scripts/export_resume_pdf.py

      - name: Verify generated website
        run: python3 scripts/verify_site.py public

      - name: Verify generated output is current
        run: >-
          git diff --exit-code --
          public
          static/output.css
          static/processed_images
          ':(exclude)public/downloads/Jordan-Butterwick-Resume.pdf'

      - name: Upload application résumé
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jordan-butterwick-resume-${{ github.sha }}
          path: static/downloads/Jordan-Butterwick-Resume.pdf
          if-no-files-found: error
          retention-days: 30