base_url = "https://butterwick.tech"
compile_sass = true
build_search_index = true
theme = "prairie"

[extra]

env = "ZOLA_ENV"
color_mode = "auto"
site_name = "butterwick.tech"
menu_items = [
    { name = "projects", url = "$LANG_BASE_URL/projects", show_recent = true, recent_items = 3, recent_trans_key = "recent_projects", more_trans_key = "more_projects" },
    { name = "blog", url = "$LANG_BASE_URL/blog", show_recent = true, recent_items = 3, recent_trans_key = "recent_blog_posts", more_trans_key = "more_blog_posts" },
    { name = "about", url = "$LANG_BASE_URL/about"},
    { name = "now", url = "$LANG_BASE_URL/now" },
    { name = "resume", url = "$LANG_BASE_URL/resume/" },
]

[extra.profile]
name = "Jordan Butterwick"
role = "Senior Software Engineer"
location = "Airdrie, Alberta"
email = "jordan@butterwick.tech"
tagline = "I build and lead reliable backend, data, cloud, and ML systems at production scale."
about_preview = "I turn complex systems into dependable products, with an emphasis on clear architecture, pragmatic delivery, and teams that can own what they build."

[[extra.impact]]
value = "15M"
label = "users scaled"

[[extra.impact]]
value = "Billions"
label = "of records managed"

[[extra.impact]]
value = "Millions"
label = "of daily events"

[[extra.impact]]
value = "75%"
label = "AWS cost reduction"

[extra.images]
# Width defined in pixels
max_width = 2500

# Open Graph Protocol objects. See: https://ogp.me/
[extra.ogp]
locale = "en_US"
first_name = "Jordan"
last_name = "Butterwick"
gender = "male"
username = "jbutterwick"
site_name = "butterwick.tech"
image = "/social-card.png"
image_alt = "Jordan Butterwick, Senior Software Engineer at butterwick.tech"
image_width = 1200
image_height = 630

# Footer social links; full options listed in macros/social.html
[extra.social]
email = "jordan@butterwick.tech"
linkedin = "jbutterwick"
github = "jbutterwick"


[languages]

[languages.en]
title = "Jordan Butterwick — Senior Software Engineer"
description = "Senior software engineer building reliable backend, data, cloud, and machine-learning systems at production scale."
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]
taxonomies = [
    { name = "tags", feed = true, lang = "en" },
    { name = "categories", feed = true, lang = "en" },
]

